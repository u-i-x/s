name: init

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name of app'
        required: true
        default: 'my-app'
      template:
        description: 'Framework template'
        required: true
        default: 'vite'
        type: choice
        options:
          - vite
          - next
          - start
          - astro
          - react-router
          - laravel
      preset:
        description: 'Shadcn preset'
        required: true
        default: 'a1D0dv72'
      base:
        description: 'Shadcn base'
        required: true
        default: 'base'
        type: choice
        options:
          - base
          - radix

jobs:
  create-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cleanup
      run: |
        shopt -s extglob
        find . -mindepth 1 ! -path "./.github*" -exec rm -rf {} +

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        
    - name: Create App
      run: pnpm dlx shadcn@latest init --monorepo --base ${{ inputs.base }} --template ${{ inputs.template }} --preset ${{ inputs.preset }} --name ${{ inputs.name }}

    - name: Move app to root
      run: |
        shopt -s dotglob
        mv ${{ inputs.name }}/* .
        rmdir ${{ inputs.name }}

    - name: Commit changes
      run: |
        git init
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m 'Set up app using Github Actions'

    - name: Push changes
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
        force: true
